<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ctrlb-decompose - Log Pattern Analyzer</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        header h1 span {
            color: var(--text-muted);
            font-weight: 400;
        }

        header a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }

        header a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls label {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .controls select,
        .controls input[type="number"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.375rem 0.625rem;
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .controls input[type="number"] {
            width: 5rem;
        }

        .controls select:focus,
        .controls input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-label {
            font-size: 0.8125rem;
            color: var(--accent);
            cursor: pointer;
            border: 1px dashed var(--border);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
        }

        .file-label:hover {
            border-color: var(--accent);
        }

        .file-label input {
            display: none;
        }

        .input-area {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            max-height: 300px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8125rem;
            line-height: 1.5;
            padding: 0.75rem;
            border-radius: 6px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .output-area {
            flex: 1;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .output-header h2 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .stats {
            font-size: 0.75rem;
            color: var(--green);
        }

        #output {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8125rem;
            line-height: 1.5;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 300px;
            color: var(--text-muted);
        }

        #output.has-content {
            color: var(--text);
        }

        .drop-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(88, 166, 255, 0.1);
            border: 3px dashed var(--accent);
            z-index: 100;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--accent);
        }

        .drop-overlay.active {
            display: flex;
        }

        .spacer {
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>ctrlb-decompose <span>Log Pattern Analyzer</span></h1>
        <a href="https://github.com/ctrlb-hq/ctrlb-decompose">GitHub</a>
    </header>

    <div class="container">
        <div class="controls">
            <label>
                Format
                <select id="format-select">
                    <option value="human">Human</option>
                    <option value="llm">LLM</option>
                    <option value="json">JSON</option>
                </select>
            </label>
            <label>
                Top N
                <input type="number" id="top-n" value="20" min="1" max="1000">
            </label>
            <label>
                Context lines
                <input type="number" id="context" value="0" min="0" max="10">
            </label>
            <label class="file-label">
                Load file
                <input type="file" id="file-input" accept=".log,.txt,.csv,*">
            </label>
            <div class="spacer"></div>
            <button id="analyze-btn" disabled>Loading WASM...</button>
        </div>

        <div class="input-area">
            <textarea id="log-input" placeholder="Paste your log lines here, or drag & drop a file..."></textarea>
        </div>

        <div class="output-area">
            <div class="output-header">
                <h2>Output</h2>
                <span id="stats" class="stats"></span>
            </div>
            <pre id="output">Results will appear here after analysis.</pre>
        </div>
    </div>

    <div class="drop-overlay" id="drop-overlay">Drop log file to load</div>

    <script type="module" src="app.js"></script>
</body>
</html>
